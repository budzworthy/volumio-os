# Workflow to build a Raspberry Pi image
name: Build Raspberry Pi Image

on:
  # Allows manual runs from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            debootstrap \
            dosfstools \
            git \
            jq \
            kpartx \
            libssl-dev \
            lz4 \
            lzop \
            md5deep \
            multistrap \
            parted \
            patch \
            pv \
            qemu-user-static \
            qemu-utils \
            qemu-system-arm \
            squashfs-tools \
            u-boot-tools \
            wget \
            xz-utils \
            zip

      - name: Build Raspberry Pi image
        run: sudo ./build.sh -b arm -d pi -v 9.999

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: volumio-pi-image
          path: "*.img*"
          if-no-files-found: warn
